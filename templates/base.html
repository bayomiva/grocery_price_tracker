<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LocalPrice Nigeria{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .nav-link { @apply text-white hover:text-green-200 transition-colors; }
    .btn-primary { @apply bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition font-semibold; }
    .btn-secondary { @apply bg-white text-green-700 border border-green-600 px-4 py-2 rounded-lg hover:bg-green-50 transition font-semibold; }
    .btn-approve { @apply bg-green-600 text-white text-xs px-3 py-1 rounded-lg hover:bg-green-700 transition font-semibold; }
    .btn-reject  { @apply bg-red-500 text-white text-xs px-3 py-1 rounded-lg hover:bg-red-600 transition font-semibold; }
    .card { @apply bg-white rounded-xl shadow-sm border border-gray-100 p-5; }
    .form-input { @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500; }
    .badge { @apply inline-block px-2 py-0.5 rounded-full text-xs font-semibold; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="bg-green-700 shadow-lg sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4">
    <div class="flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-2">
        <span class="text-2xl">🛒</span>
        <span class="text-white font-bold text-xl">LocalPrice <span class="text-green-200">Nigeria</span></span>
      </a>
      <div class="hidden md:flex items-center gap-6">
        <a href="/" class="nav-link">Home</a>
        <a href="/compare-prices/" class="nav-link">Compare</a>
        <a href="/submit-price/" class="nav-link">Submit Price</a>
        <a id="nav-admin-link" href="/admin-dashboard/"
           class="hidden nav-link relative flex items-center gap-1.5">
          <span>⚙️ Admin</span>
          <span id="nav-pending-badge"
            class="hidden absolute -top-2 -right-3 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center leading-none">
          </span>
        </a>
      </div>
      <div class="flex items-center gap-3">
        <span id="nav-user-info" class="hidden text-green-100 text-sm font-medium"></span>
        <a id="nav-login-btn" href="/login/" class="btn-secondary text-sm py-1.5 hidden">Login</a>
        <button id="nav-logout-btn" onclick="doLogout()" class="bg-red-500 text-white text-sm px-3 py-1.5 rounded-lg hover:bg-red-600 transition hidden">Logout</button>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE CONTENT -->
<main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
  {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="bg-green-800 text-green-100 text-center py-4 text-sm mt-8">
  <p>LocalPrice Nigeria &mdash; Community-driven grocery prices for Nigerian markets</p>
</footer>

<script>
  // ── Auth helpers ──────────────────────────────────────────────────────────
  const getToken = () => localStorage.getItem('lp_token');
  const getUser  = () => { try { return JSON.parse(localStorage.getItem('lp_user')); } catch { return null; } };

  function setAuth(token, user) {
    localStorage.setItem('lp_token', token);
    localStorage.setItem('lp_user', JSON.stringify(user));
    updateNav();
  }
  function clearAuth() {
    localStorage.removeItem('lp_token');
    localStorage.removeItem('lp_user');
    updateNav();
  }
  async function updateNav() {
    const token = getToken(); const user = getUser();
    const info      = document.getElementById('nav-user-info');
    const loginBtn  = document.getElementById('nav-login-btn');
    const logoutBtn = document.getElementById('nav-logout-btn');
    const adminLink = document.getElementById('nav-admin-link');
    const badge     = document.getElementById('nav-pending-badge');

    if (token && user) {
      info.textContent = `👤 ${user.username} · ${user.points || 0}pts`;
      info.classList.remove('hidden');
      loginBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');

      // Show admin nav + pending badge for staff
      if (user.is_staff) {
        adminLink.classList.remove('hidden');
        // Fetch pending count
        try {
          const dash = await api('/api/dashboard/');
          const n = dash.pendingSubmissions || 0;
          if (n > 0) {
            badge.textContent = n > 9 ? '9+' : n;
            badge.classList.remove('hidden');
          } else {
            badge.classList.add('hidden');
          }
        } catch {}
      } else {
        adminLink.classList.add('hidden');
      }
    } else {
      info.classList.add('hidden');
      loginBtn.classList.remove('hidden');
      logoutBtn.classList.add('hidden');
      adminLink.classList.add('hidden');
    }
  }
  async function doLogout() {
    const token = getToken();
    if (token) {
      await fetch('/api/accounts/logout/', {
        method: 'POST',
        headers: { Authorization: `Token ${token}` }
      }).catch(() => {});
    }
    clearAuth();
    window.location.href = '/';
  }

  // ── Fetch wrapper ──────────────────────────────────────────────────────────
  async function api(path, opts = {}) {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (token) headers['Authorization'] = `Token ${token}`;
    const res = await fetch(path, { ...opts, headers });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw { status: res.status, data };
    return data;
  }

  // Format naira
  const naira = v => '₦' + Number(v).toLocaleString('en-NG', { minimumFractionDigits: 0 });

  // Init nav on load
  updateNav();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
