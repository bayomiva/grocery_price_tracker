<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LocalPrice Nigeria{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .btn-primary   { @apply bg-emerald-600 text-white px-4 py-2.5 rounded-xl hover:bg-emerald-700 active:scale-95 transition-all font-semibold text-sm shadow-sm shadow-emerald-100; }
    .btn-secondary { @apply bg-white text-emerald-700 border border-emerald-200 px-4 py-2.5 rounded-xl hover:bg-emerald-50 active:scale-95 transition-all font-semibold text-sm; }
    .btn-approve   { @apply bg-emerald-500 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-emerald-600 active:scale-95 transition-all font-semibold; }
    .btn-reject    { @apply bg-red-500 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-red-600 active:scale-95 transition-all font-semibold; }
    .card          { @apply bg-white rounded-2xl border border-slate-100 shadow-sm p-5; }
    .form-input    { @apply w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition bg-white; }
    .badge         { @apply inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold; }
    .nav-link      { @apply text-slate-600 hover:text-emerald-700 font-medium text-sm transition-colors; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<!-- TOP HEADER -->
<header class="bg-white/95 backdrop-blur-sm border-b border-slate-100 sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
    <a href="/" class="flex items-center gap-2 shrink-0">
      <div class="w-7 h-7 bg-emerald-600 rounded-lg flex items-center justify-center shrink-0">
        <span class="text-white font-bold text-sm leading-none">₦</span>
      </div>
      <span class="font-bold text-slate-800 tracking-tight">LocalPrice<span class="text-emerald-600">NG</span></span>
    </a>

    <nav class="hidden md:flex items-center gap-0.5 flex-1 ml-2">
      <a href="/" class="nav-link px-3 py-2 rounded-lg hover:bg-slate-50">Home</a>
      <a href="/compare-prices/" class="nav-link px-3 py-2 rounded-lg hover:bg-slate-50">Compare</a>
      <a href="/submit-price/" class="nav-link px-3 py-2 rounded-lg hover:bg-slate-50">Submit Price</a>
      <a id="nav-admin-link" href="/admin-dashboard/" class="hidden nav-link px-3 py-2 rounded-lg hover:bg-slate-50 relative">
        Admin
        <span id="nav-pending-badge"
          class="hidden absolute -top-0.5 -right-0.5 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center leading-none" style="font-size:9px;font-weight:700;">
        </span>
      </a>
    </nav>

    <div class="flex items-center gap-2 shrink-0">
      <span id="nav-user-info" class="hidden text-slate-700 text-xs font-semibold bg-slate-100 px-3 py-1.5 rounded-lg whitespace-nowrap"></span>
      <a id="nav-login-btn" href="/login/" class="hidden btn-primary !py-2 !text-xs">Login</a>
      <button id="nav-logout-btn" onclick="doLogout()"
        class="hidden text-xs font-medium text-slate-500 border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition">
        Sign out
      </button>
    </div>
  </div>
</header>

<!-- PAGE CONTENT -->
<main class="flex-1 max-w-6xl mx-auto w-full px-4 py-6 pb-28 md:pb-10">
  {% block content %}{% endblock %}
</main>

<!-- MOBILE BOTTOM NAV -->
<nav class="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-slate-100 z-50 flex items-stretch" style="padding-bottom: env(safe-area-inset-bottom);">
  <a href="/" id="bnav-home" class="flex flex-col items-center justify-center gap-0.5 flex-1 py-2.5 text-slate-400 hover:text-emerald-600 transition-colors">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75"/>
    </svg>
    <span class="text-xs font-medium">Home</span>
  </a>
  <a href="/compare-prices/" id="bnav-compare" class="flex flex-col items-center justify-center gap-0.5 flex-1 py-2.5 text-slate-400 hover:text-emerald-600 transition-colors">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/>
    </svg>
    <span class="text-xs font-medium">Compare</span>
  </a>
  <a href="/submit-price/" id="bnav-submit" class="flex flex-col items-center justify-center gap-0.5 flex-1 pt-1 pb-2.5 text-slate-400 hover:text-emerald-600 transition-colors">
    <div class="w-11 h-11 bg-emerald-600 rounded-2xl flex items-center justify-center -mt-5 shadow-lg shadow-emerald-200 border-4 border-slate-50">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
    </div>
    <span class="text-xs font-medium">Submit</span>
  </a>
  <a href="/compare-prices/" id="bnav-map" class="flex flex-col items-center justify-center gap-0.5 flex-1 py-2.5 text-slate-400 hover:text-emerald-600 transition-colors">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z"/>
    </svg>
    <span class="text-xs font-medium">Map</span>
  </a>
  <a href="/login/" id="bnav-account" class="flex flex-col items-center justify-center gap-0.5 flex-1 py-2.5 text-slate-400 hover:text-emerald-600 transition-colors">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
    </svg>
    <span class="text-xs font-medium" id="bnav-account-label">Account</span>
  </a>
</nav>

<!-- FOOTER (desktop only) -->
<footer class="hidden md:block border-t border-slate-100 bg-white text-slate-400 text-center py-4 text-xs">
  LocalPrice Nigeria &mdash; Community-driven grocery prices for Nigerian markets
</footer>

<script>
  (function () {
    const path = window.location.pathname;
    const idMap = { '/': 'bnav-home', '/compare-prices/': 'bnav-compare', '/submit-price/': 'bnav-submit' };
    const activeId = idMap[path];
    if (activeId) {
      const el = document.getElementById(activeId);
      if (el) el.classList.add('text-emerald-600');
    }
  })();

  const getToken = () => localStorage.getItem('lp_token');
  const getUser  = () => { try { return JSON.parse(localStorage.getItem('lp_user')); } catch { return null; } };

  function setAuth(token, user) {
    localStorage.setItem('lp_token', token);
    localStorage.setItem('lp_user', JSON.stringify(user));
    updateNav();
  }
  function clearAuth() {
    localStorage.removeItem('lp_token');
    localStorage.removeItem('lp_user');
    updateNav();
  }
  async function updateNav() {
    const token = getToken(); const user = getUser();
    const info      = document.getElementById('nav-user-info');
    const loginBtn  = document.getElementById('nav-login-btn');
    const logoutBtn = document.getElementById('nav-logout-btn');
    const adminLink = document.getElementById('nav-admin-link');
    const badge     = document.getElementById('nav-pending-badge');
    const bnavAcct  = document.getElementById('bnav-account');
    const bnavLabel = document.getElementById('bnav-account-label');

    if (token && user) {
      info.textContent = `${user.username} · ${user.points || 0}pts`;
      info.classList.remove('hidden');
      loginBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');
      if (bnavAcct) { bnavAcct.href = '#'; bnavAcct.onclick = doLogout; }
      if (bnavLabel) bnavLabel.textContent = user.username.slice(0, 7);

      if (user.is_staff) {
        adminLink.classList.remove('hidden');
        try {
          const dash = await api('/api/dashboard/');
          const n = dash.pendingSubmissions || 0;
          if (n > 0) {
            badge.textContent = n > 9 ? '9+' : n;
            badge.classList.remove('hidden');
          } else {
            badge.classList.add('hidden');
          }
        } catch {}
      } else {
        adminLink.classList.add('hidden');
      }
    } else {
      info.classList.add('hidden');
      loginBtn.classList.remove('hidden');
      logoutBtn.classList.add('hidden');
      adminLink.classList.add('hidden');
    }
  }
  async function doLogout() {
    const token = getToken();
    if (token) {
      await fetch('/api/accounts/logout/', {
        method: 'POST',
        headers: { Authorization: `Token ${token}` }
      }).catch(() => {});
    }
    clearAuth();
    window.location.href = '/';
  }

  async function api(path, opts = {}) {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (token) headers['Authorization'] = `Token ${token}`;
    const res = await fetch(path, { ...opts, headers });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw { status: res.status, data };
    return data;
  }

  const naira = v => '₦' + Number(v).toLocaleString('en-NG', { minimumFractionDigits: 0 });

  updateNav();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
